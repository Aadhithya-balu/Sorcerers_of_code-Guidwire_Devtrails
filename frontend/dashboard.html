<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gig Worker Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">
  <div class="logo-icon">🚀</div>
  Gig Worker Insurance Dashboard
</div>

<div class="container">

  <!-- CITY FETCH -->
  <div class="section">
    <h2>📍 Location</h2>
    <div style="display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;">
      <div class="form-group" style="flex:1;min-width:200px;">
        <label>City</label>
        <input type="text" id="city" placeholder="Enter city">
      </div>
      <button onclick="fetchData()">Fetch Data</button>
    </div>
  </div>

  <!-- METRIC CARDS -->
  <div class="grid">
    <div class="metric-card">
      <h3>💰 Weekly Premium</h3>
      <p id="premium">₹0</p>
    </div>
    <div class="metric-card" style="border-left-color:var(--warning);">
      <h3>⚠ Risk Score</h3>
      <p id="risk">0</p>
    </div>
    <div class="metric-card" style="border-left-color:var(--danger);">
      <h3>📉 Expected Loss</h3>
      <p id="loss">₹0</p>
    </div>
    <div class="metric-card" style="border-left-color:var(--info);">
      <h3>📦 Missed Orders</h3>
      <p id="missed">0</p>
    </div>
    <div class="metric-card" style="border-left-color:var(--success);">
      <h3>📊 Efficiency</h3>
      <p id="efficiency">0%</p>
    </div>
    <div class="metric-card" style="border-left-color:var(--primary-end);">
      <h3>⚡ Auto Claim</h3>
      <p id="claim">No</p>
    </div>
  </div>

  <!-- WORKER INPUTS -->
  <div class="section" style="margin-top:24px;">
    <h2>🧠 Worker Inputs</h2>
    <div class="form-grid">
      <div class="form-group"><label>Avg Daily Income (₹)</label><input id="avg_daily_income" type="number" placeholder="0"></div>
      <div class="form-group"><label>Weekly Working Days</label><input id="weekly_working_days" type="number" placeholder="0"></div>
      <div class="form-group"><label>Avg Daily Hours</label><input id="avg_daily_hours" type="number" step="0.1" placeholder="0.0"></div>
      <div class="form-group"><label>Total Orders</label><input id="total_orders" type="number" placeholder="0"></div>
      <div class="form-group"><label>Delivered Orders</label><input id="delivered_orders" type="number" placeholder="0"></div>
      <div class="form-group"><label>Disruption Hours</label><input id="disruption_hours" type="number" step="0.1" placeholder="0.0"></div>
    </div>
    <div style="margin-top:18px;">
      <button onclick="calculateDashboard()">Update Dashboard</button>
    </div>
  </div>

</div>

<script>
async function fetchData() {
  const city = document.getElementById("city").value;
  const res = await fetch(`http://127.0.0.1:8000/fetch_location_data?city=${encodeURIComponent(city)}`);
  window.locationData = await res.json();
  alert("Weather data loaded!");
}

async function calculateDashboard() {
  const data = {
    ...window.locationData,
    zone_risk_level: "medium",
    avg_daily_income: parseFloat(document.getElementById("avg_daily_income").value),
    weekly_working_days: parseInt(document.getElementById("weekly_working_days").value),
    avg_daily_hours: parseFloat(document.getElementById("avg_daily_hours").value),
    historical_disruption_rate: 0.3,
    predicted_disruption_probability: 0.4,
    fraud_risk_score: 0.2,
    total_orders: parseInt(document.getElementById("total_orders").value),
    delivered_orders: parseInt(document.getElementById("delivered_orders").value),
    disruption_hours: parseFloat(document.getElementById("disruption_hours").value)
  };

  const result = await (await fetch("http://127.0.0.1:8000/calculate_ai_premium", {
    method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify(data)
  })).json();

  document.getElementById("premium").innerText = "₹" + result.weekly_premium;
  document.getElementById("loss").innerText = "₹" + result.expected_loss;
  document.getElementById("missed").innerText = result.missed_orders;
  document.getElementById("efficiency").innerText = (result.efficiency * 100).toFixed(0) + "%";
  document.getElementById("claim").innerHTML = result.auto_claim_triggered
    ? '<span class="badge badge-blue">YES ⚡</span>' : '<span class="badge badge-green">No</span>';

  const riskEl = document.getElementById("risk");
  riskEl.innerText = result.risk_score;
  riskEl.className = result.risk_score > 0.6 ? "high" : result.risk_score > 0.3 ? "medium" : "low";

  // Update left border of risk card dynamically
  riskEl.closest(".metric-card").style.borderLeftColor =
    result.risk_score > 0.6 ? "var(--danger)" : result.risk_score > 0.3 ? "var(--warning)" : "var(--success)";
}
</script>
</body>
</html>
